<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forensiq — Login</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07080f;
    --bg2: #0d0f1a;
    --surface: #141726;
    --surface2: #1a1e2e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e2e6f0;
    --text2: #8892a4;
    --text3: #4a5568;
    --accent: #3b7fff;
    --green: #22c55e;
    --red: #ef4444;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-wrap {
    width: 100%;
    max-width: 380px;
    padding: 24px;
  }

  .logo {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-mark {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo-mark span { color: var(--accent); }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .card-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 24px;
  }

  .form-field {
    margin-bottom: 16px;
  }

  .form-field label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    display: block;
    margin-bottom: 7px;
  }

  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }

  .error-msg {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    margin-bottom: 16px;
    display: none;
  }

  .error-msg.visible { display: block; }

  .btn-login {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 11px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s;
    margin-top: 8px;
  }

  .btn-login:hover { background: #2563eb; }
  .btn-login:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; }

  .login-footer {
    text-align: center;
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">
    <div class="logo-mark">FOREN<span>SIQ</span></div>
    <div class="logo-sub">Evidence Analysis System</div>
  </div>

  <div class="login-card">
    <div class="card-title">Analyst Login</div>
    <div class="card-sub">Authorized personnel only</div>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-field">
      <label>Username</label>
      <input class="form-input" type="text" id="username" placeholder="d.kowalski" autocomplete="username">
    </div>

    <div class="form-field">
      <label>Password</label>
      <input class="form-input" type="password" id="password" placeholder="············" autocomplete="current-password">
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>

  <div class="login-footer">
    Account access is managed by your system administrator.
  </div>
</div>

<script>
const AUTH_URL = 'http://localhost:3000';

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');

  err.classList.remove('visible');

  if (!username || !password) {
    showError('Username and password are required.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Authenticating...';

  try {
    const res = await fetch(`${AUTH_URL}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (res.ok) {
      sessionStorage.setItem('forensiq_token', data.token);
      sessionStorage.setItem('forensiq_user', JSON.stringify(data.user));
      sessionStorage.setItem('forensiq_expires', data.expires_at);
      window.location.href = 'index.html';
    } else {
      showError(data.error || 'Invalid credentials.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch (e) {
    showError('Cannot connect to auth server. Is it running on port 3000?');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function showError(msg) {
  const err = document.getElementById('error-msg');
  err.textContent = msg;
  err.classList.add('visible');
}

if (sessionStorage.getItem('forensiq_token')) {
  window.location.href = 'index.html';
}
</script>

</body>
</html>
